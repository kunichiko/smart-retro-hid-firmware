; ===================================================================================
; PlatformIO Project Configuration File
; ===================================================================================
; Project:  Mimic X (MimicX-firmware)
; Author:   Kunihiko Ohnaka (@kunichiko)
; Year:     2026
; URL:      https://github.com/kunichiko/MimicX-firmware
; ===================================================================================
; ボードごとに env を分けてビルド:
;   pio run -e joystick           : ATARI/MD6 ジョイスティック基板
;   pio run -e x68k_keyboard      : X68000 キーボード単体基板
;   pio run -e x68k_full          : X68000 キーボード + マウス
; ===================================================================================

; --- 共通設定 (env で extends) ---
[common]
platform = https://github.com/Community-PIO-CH32V/platform-ch32v.git
board = genericCH32X035C8T6
framework = ch32v003fun
upload_protocol = minichlink

; --- ATARI/MD6 ジョイスティック ---
[env:joystick]
extends = common
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_JOYSTICK
  -Os
build_src_filter =
  +<*>
  -<functions/>
  +<functions/joystick/>

; --- X68000 キーボード単体 ---
[env:x68k_keyboard]
extends = common
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_X68K_KEYBOARD
  -Os
build_src_filter =
  +<*>
  -<functions/>
  +<functions/x68k_keyboard/>

; --- X68000 キーボード + マウス (将来用) ---
[env:x68k_full]
extends = common
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_X68K_FULL
  -Os
build_src_filter =
  +<*>
  -<functions/>
  +<functions/x68k_keyboard/>
  +<functions/x68k_mouse/>

; --- デバッグ用 (joystick, debug ビルド) ---
[env:joystick-debug]
extends = common
build_type = debug
build_unflags = -Os -O2 -O3 -flto
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_JOYSTICK
  -Og -g3
  -fno-inline
  -fno-omit-frame-pointer
  -fno-optimize-sibling-calls
  -fno-lto
  -ffunction-sections -fdata-sections
build_src_filter =
  +<*>
  -<functions/>
  +<functions/joystick/>
debug_tool = custom
debug_port = :2000
debug_server =
  ${platformio.packages_dir}/tool-minichlink/minichlink
  -G
debug_load_mode = manual
debug_init_cmds =
  define pio_reset_halt_target
    monitor halt
  end
  define pio_reset_run_target
    monitor reset
  end
  target extended-remote $DEBUG_PORT
  set mem inaccessible-by-default off
  $INIT_BREAK
