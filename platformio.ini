; ===================================================================================
; PlatformIO Project Configuration File
; ===================================================================================
; Project:  Mimic X (MimicX-firmware)
; Author:   Kunihiko Ohnaka (@kunichiko)
; Year:     2026
; URL:      https://github.com/kunichiko/MimicX-firmware
; ===================================================================================
; ボードごとに env を分けてビルド:
;   pio run -e joystick           : ATARI/MD6 ジョイスティック基板
;   pio run -e x68k_keyboard      : X68000 キーボード基板 (本体側へキーボード+マウス)
;   pio run -e combined           : 全機能 (joystick + x68k_keyboard + x68k_mouse) 同時搭載
; ===================================================================================

; --- 共通設定 (env で extends) ---
; board は基板ごとに搭載する MCU パッケージが違うため env 側で指定する。
;   joystick      → CH32X035G8U6 (QFN28, atari-joystick rev2)
;   x68k_keyboard → CH32X035G8U6 (QFN28, x68000-keyboard 基板)
[common]
platform = https://github.com/Community-PIO-CH32V/platform-ch32v.git
framework = ch32v003fun
upload_protocol = minichlink

; --- ATARI/MD6 ジョイスティック ---
[env:joystick]
extends = common
board = genericCH32X035G8U6
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_JOYSTICK
  -Os
build_src_filter =
  +<*>
  -<functions/>
  +<functions/joystick/>

; --- X68000 キーボード (本体接続のキーボード + マウスポート対応) ---
[env:x68k_keyboard]
extends = common
board = genericCH32X035G8U6
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_X68K_KEYBOARD
  -Os
build_src_filter =
  +<*>
  -<functions/>
  +<functions/x68k_keyboard/>
  +<functions/x68k_mouse/>

; --- Combined: ジョイスティック + X68000 キーボード/マウス 同時搭載 ---
; 1 個の MCU で全機能。GPIO/ペリフェラル/MIDI ch すべて衝突なし。
[env:combined]
extends = common
board = genericCH32X035G8U6
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_COMBINED
  -Os
build_src_filter =
  +<*>
  -<functions/>
  +<functions/joystick/>
  +<functions/x68k_keyboard/>
  +<functions/x68k_mouse/>

; --- デバッグ用 (joystick, debug ビルド) ---
[env:joystick-debug]
extends = common
board = genericCH32X035G8U6
build_type = debug
build_unflags = -Os -O2 -O3 -flto
build_flags =
  -I.
  -D F_CPU=48000000
  -D BOARD_JOYSTICK
  -Og -g3
  -fno-inline
  -fno-omit-frame-pointer
  -fno-optimize-sibling-calls
  -fno-lto
  -ffunction-sections -fdata-sections
build_src_filter =
  +<*>
  -<functions/>
  +<functions/joystick/>
debug_tool = custom
debug_port = :2000
debug_server =
  ${platformio.packages_dir}/tool-minichlink/minichlink
  -G
debug_load_mode = manual
debug_init_cmds =
  define pio_reset_halt_target
    monitor halt
  end
  define pio_reset_run_target
    monitor reset
  end
  target extended-remote $DEBUG_PORT
  set mem inaccessible-by-default off
  $INIT_BREAK
